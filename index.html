<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP fallback for production file:// loads (onHeadersReceived does not fire
         for file:// in Electron 41). frame-ancestors and form-action are omitted
         here because <meta> CSP does not support them; they are enforced via the
         HTTP header injected by installCsp() in the dev server path. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; worker-src 'none'; media-src 'none'; base-uri 'none'" />
    <title>Polyphon</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/index.tsx"></script>
  </body>
</html>
