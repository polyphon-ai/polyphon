name: Update Download Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable app version (semver, e.g. 0.4.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  update-and-deploy:
    name: Update downloadVersion and Deploy Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "Error: '$VERSION' looks like a pre-release version. Pre-releases should remain as pre-releases."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Checkout site repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: polyphon-ai/polyphon-ai.github.io
          ref: main
          token: ${{ secrets.POLYPHON_SITE_TOKEN }}
          path: site-repo

      - name: Update downloadVersion in hugo.yaml
        run: |
          sed -i "s/downloadVersion: .*/downloadVersion: \"${VERSION}\"/" site-repo/hugo.yaml

      - name: Create release blog post
        run: |
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SLUG="polyphon-v${VERSION}-released"
          POST_DIR="site-repo/content/blog/${SLUG}"
          mkdir -p "$POST_DIR"

          NOTES=""
          if [ -f RELEASE_NOTES.md ]; then
            NOTES="$(cat RELEASE_NOTES.md)"
          fi

          cat > "$POST_DIR/index.md" <<EOF
          ---
          title: "Polyphon v${VERSION} Released"
          description: "Polyphon v${VERSION} is now available for download."
          date: "${DATE}"
          draft: false
          tags: ["release", "announcement"]
          categories: ["Announcements"]
          ---

          Polyphon v${VERSION} is now available.

          ${NOTES}

          [Download the latest release](https://polyphon.ai/#download)
          EOF

      - name: Commit and push site repo
        run: |
          cd site-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hugo.yaml content/blog/
          git diff --cached --quiet || git commit -m "chore(release): update site to v${VERSION}"
          git push

      - name: Trigger site deploy
        run: gh workflow run deploy-site.yml --repo polyphon-ai/polyphon-ai.github.io --ref main
        env:
          GH_TOKEN: ${{ secrets.POLYPHON_SITE_TOKEN }}

      - name: Promote release on GitHub
        run: |
          TAG="v${VERSION}"
          gh release edit "$TAG" --prerelease=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

