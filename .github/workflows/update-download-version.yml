name: Update Download Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable app version (semver, e.g. 0.4.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  update-and-deploy:
    name: Update downloadVersion and Deploy Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update downloadVersion in hugo.yaml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          sed -i "s/downloadVersion: .*/downloadVersion: \"${VERSION}\"/" site/hugo.yaml

      - name: Create release blog post
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SLUG="polyphon-v${VERSION}-released"
          POST_DIR="site/content/blog/${SLUG}"
          mkdir -p "$POST_DIR"

          NOTES=""
          if [ -f RELEASE_NOTES.md ]; then
            NOTES="$(cat RELEASE_NOTES.md)"
          fi

          cat > "$POST_DIR/index.md" <<EOF
          ---
          title: "Polyphon v${VERSION} Released"
          description: "Polyphon v${VERSION} is now available for download."
          date: "${DATE}"
          draft: false
          tags: ["release", "announcement"]
          categories: ["Announcements"]
          ---

          Polyphon v${VERSION} is now available.

          ${NOTES}

          [Download the latest release](https://polyphon.ai/#download)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/hugo.yaml site/content/blog/
          git diff --cached --quiet || git commit -m "chore(release): update site to v${{ github.event.inputs.version }}"
          git push

      - name: Trigger site deploy
        run: gh workflow run deploy-site.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote release on GitHub
        run: |
          TAG="v${{ github.event.inputs.version }}"
          gh release edit "$TAG" --repo polyphon-ai/releases --prerelease=false --latest
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}

      - name: Delete old releases
        run: |
          CURRENT_TAG="v${{ github.event.inputs.version }}"

          # Keep: the stable we just promoted + the single most recent pre-release.
          # Delete: all older stables and all older pre-releases.
          LATEST_PRERELEASE=$(gh release list --repo polyphon-ai/releases --limit 100 \
            --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease == true)] | first | .tagName // ""')

          gh release list --repo polyphon-ai/releases --limit 100 --json tagName,isPrerelease \
            --jq '.[] | "\(.isPrerelease) \(.tagName)"' | while read -r IS_PRE TAG; do
            if [ "$TAG" = "$CURRENT_TAG" ]; then
              echo "Keeping stable: $TAG"
            elif [ "$TAG" = "$LATEST_PRERELEASE" ]; then
              echo "Keeping pre-release: $TAG"
            else
              echo "Deleting: $TAG"
              gh release delete "$TAG" --repo polyphon-ai/releases --yes --cleanup-tag
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
