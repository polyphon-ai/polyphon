# Sync all SDK source files to polyphon-js and publish @polyphon-ai/js to npm.
#
# Triggered after the Release workflow completes successfully on a version tag.
# Gating on Release ensures the DMG is signed, notarized, and published before
# the SDK is synced — so the SDK version always corresponds to a real release.
#
# What gets synced to polyphon-js/src/:
#   - types.ts, api.ts          from polyphon/src/shared/ (source of truth for the API contract)
#   - client.ts, errors.ts,     from polyphon/src/sdk/ (source of truth for the SDK implementation)
#     token.ts, index.ts
#   - testing/                  from polyphon/src/sdk/testing/ (mock server + fixtures)
#   - *.test.ts                 from polyphon/src/sdk/ (test files run in polyphon CI first)
#
# Required secrets:
#   POLYPHON_SDK_SYNC_TOKEN — GitHub PAT scoped to polyphon-ai/polyphon-js
#                             with contents:write permission only
#   NPM_TOKEN               — npm granular token scoped to @polyphon-ai/js publish only

name: Sync SDK

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      - name: Checkout polyphon at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          path: polyphon

      - name: Checkout polyphon-js
        uses: actions/checkout@v4
        with:
          repository: polyphon-ai/polyphon-js
          token: ${{ secrets.POLYPHON_SDK_SYNC_TOKEN }}
          path: polyphon-js

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Derive version from tag
        id: version
        run: echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}

      - name: Sync shared types and SDK source files
        run: node polyphon/scripts/sync-sdk.mjs polyphon-js

      - name: Bump SDK version
        working-directory: polyphon-js
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version

      - name: Commit, tag, and push polyphon-js changes
        working-directory: polyphon-js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ package.json package-lock.json
          git commit -m "chore: sync sdk and bump version to ${{ steps.version.outputs.value }} [skip ci]"
          git tag v${{ steps.version.outputs.value }}
          git push
          git push origin v${{ steps.version.outputs.value }}

      - name: Install dependencies and build
        working-directory: polyphon-js
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        working-directory: polyphon-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
