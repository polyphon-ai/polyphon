  #
  #     - name: Build app for e2e
  #       run: npm run build:e2e
  #
  #     - name: E2E tests
  #       run: npx playwright test
  #
  #     - name: Upload test artifacts on failure
  #       if: failure()
  #       uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
  #       with:
  #         name: e2e-artifacts-${{ github.ref_name }}
  #         path: |
  #           test-results/
  #           playwright-report/
  #         retention-days: 7

  # ── 2. Build, sign, and notarize macOS arm64 ─────────────────────────────
  make-macos-arm64:
    name: Make (macOS arm64)
    # needs: [test]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Check package versions are in sync
        run: node scripts/check-versions.mjs

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build, sign, and notarize macOS arm64 (DMG + ZIP)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make -- --arch arm64

      - name: Repackage update ZIP with ditto (preserves macOS code signature)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          APP_PATH="out/Polyphon-darwin-arm64/Polyphon.app"
          ZIP_DIR="out/make/zip/darwin/arm64"
          ZIP_PATH="${ZIP_DIR}/Polyphon-${VERSION}-arm64.zip"
          # Replace Forge's ZIP (which breaks symlinks) with a ditto ZIP so that
          # ShipIt's signature validation passes when installing the update.
          rm -f "${ZIP_DIR}"/*.zip
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          node scripts/generate-update-metadata.mjs "$ZIP_PATH" "$VERSION"

      - name: Remove signing keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: installers-macos-arm64
          path: |
            out/make/**/*.dmg
            out/make/zip/darwin/arm64/*.zip
            out/make/zip/darwin/arm64/latest-mac.yml
          if-no-files-found: error
          retention-days: 3

  # ── 3. Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [make-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download source for release notes
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: installers-macos-arm64
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          repository: polyphon-ai/releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            dist/macos/**/*.dmg
            dist/macos/**/*.zip
            dist/macos/**/latest-mac.yml

  # ── 4. Publish poly to npm ────────────────────────────────────────────────
  publish-poly:
    name: Publish poly to npm
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install poly dependencies
        run: npm ci
        working-directory: packages/poly

      - name: Build poly
        run: node build.mjs
        working-directory: packages/poly

      - name: Verify shebang
        run: head -1 dist/index.js | grep -q '#!' || (echo "ERROR: dist/index.js missing shebang" && exit 1)
        working-directory: packages/poly

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/poly
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
