name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # ── 1. Lint + unit + integration ───────────────────────────────────────────
  # Run on Linux only — deterministic across OSes; gates all build jobs.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Lint (TypeScript type-check)
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  # ── 2a. Build Linux x64 AppImage ────────────────────────────────────────────
  make-linux-x64:
    name: Make (Linux x64)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1 \
            rpm

      - name: Build Linux x64 AppImage
        run: npm run make -- --arch x64

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-linux-x64
          path: out/make/**/*.AppImage
          if-no-files-found: error
          retention-days: 1

  # ── 2b. Build Linux arm64 AppImage ───────────────────────────────────────────
  make-linux-arm64:
    name: Make (Linux arm64)
    needs: test
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1 \
            rpm

      - name: Build Linux arm64 AppImage
        run: npm run make -- --arch arm64

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-linux-arm64
          path: out/make/**/*.AppImage
          if-no-files-found: error
          retention-days: 1

  # ── 2b. Build macOS arm64 installer ─────────────────────────────────────────
  make-macos-arm64:
    name: Make (macOS arm64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Build macOS arm64 installer
        run: npm run make -- --arch arm64

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-macos-arm64
          path: out/make/**/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── 2c. Build macOS x64 installer ────────────────────────────────────────────
  make-macos-x64:
    name: Make (macOS x64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Build macOS x64 installer
        run: npm run make -- --arch x64

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-macos-x64
          path: out/make/**/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── 2d. Build Windows x64 installer ──────────────────────────────────────────
  make-windows-x64:
    name: Make (Windows x64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Build Windows x64 installer
        run: npm run make -- --arch x64
        env:
          BUILD_ARCH: x64

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-windows-x64
          path: out/make/**/*.exe
          if-no-files-found: error
          retention-days: 1

  # ── 2e. Build Windows arm64 installer ────────────────────────────────────────
  make-windows-arm64:
    name: Make (Windows arm64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Build Windows arm64 installer
        run: npm run make -- --arch arm64
        env:
          BUILD_ARCH: arm64

      - name: Upload Windows arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-windows-arm64
          path: out/make/**/*.exe
          if-no-files-found: error
          retention-days: 1

  # ── 3. Create GitHub Release ─────────────────────────────────────────────────
  # Downloads all platform artifacts and attaches them to a release for the tag.
  release:
    name: Publish Release
    needs: [make-linux-x64, make-linux-arm64, make-macos-arm64, make-macos-x64, make-windows-x64, make-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-linux-x64
          path: dist/linux

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-linux-arm64
          path: dist/linux

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-macos-arm64
          path: dist/macos

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-macos-x64
          path: dist/macos

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-windows-x64
          path: dist/windows

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-windows-arm64
          path: dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/linux/**/*.AppImage
            dist/macos/**/*.dmg
            dist/windows/**/*.exe
