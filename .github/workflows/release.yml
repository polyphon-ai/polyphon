name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  # ── 1. Lint + unit + integration + e2e ────────────────────────────────────
  # Commented out: pre-push hook runs these locally before any tag is pushed.
  # Uncomment to re-enable CI test gating (costs ~60 consumed minutes per run
  # at the macOS 10× multiplier).
