name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  # ── 1. Lint + unit + integration ───────────────────────────────────────────
  # Run on Linux only — deterministic across OSes; gates all build jobs.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint (TypeScript type-check)
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  # ── 2. E2E tests (mocked) ──────────────────────────────────────────────────
  # Runs on all three platforms before any installer is built.
  # All voice providers are mocked — no real API calls are made.
  test-e2e:
    name: E2E tests (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Cache Playwright browsers (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - uses: samypr100/setup-dev-drive@30f0f98ae5636b2b6501e181dfb3631b9974818d # v4
        if: runner.os == 'Windows'
        with:
          drive-size: 4GB
          workspace-copy: true
          native-dev-drive: true

      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1 \
            xvfb

      - name: Install Playwright dependencies (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.DEV_DRIVE_WORKSPACE }}
        run: npx playwright install --with-deps chromium

      - name: Build app for e2e (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.DEV_DRIVE_WORKSPACE }}
        run: npm run build:e2e

      - name: Build app for e2e (Linux / macOS)
        if: runner.os != 'Windows'
        run: npm run build:e2e

      - name: Run GUI e2e tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x720x16' npx playwright test

      - name: Run GUI e2e tests (macOS)
        if: runner.os == 'macOS'
        run: npx playwright test

      - name: Run GUI e2e tests (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.DEV_DRIVE_WORKSPACE }}
        run: npx playwright test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-artifacts-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── 3a. Build Linux x64 .deb ────────────────────────────────────────────────
  make-linux-x64:
    name: Make (Linux x64)
    needs: [test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1

      - name: Build Linux x64 .deb
        run: npm run make -- --arch x64 --targets @electron-forge/maker-deb

      - name: Upload Linux x64 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-linux-x64
          path: out/make/**/*.deb
          if-no-files-found: error
          retention-days: 1

  # ── 3b. Build Linux arm64 .deb ───────────────────────────────────────────────
  make-linux-arm64:
    name: Make (Linux arm64)
    needs: [test, test-e2e]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1

      - name: Build Linux arm64 .deb
        run: npm run make -- --arch arm64 --targets @electron-forge/maker-deb

      - name: Upload Linux arm64 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-linux-arm64
          path: out/make/**/*.deb
          if-no-files-found: error
          retention-days: 1

  # ── 3c. Build Linux x64 Flatpak ─────────────────────────────────────────────
  make-linux-flatpak-x64:
    name: Make (Linux Flatpak x64)
    needs: [test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder elfutils

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        id: cache-flatpak-x64
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-24.08-x86_64

      - name: Install Flatpak runtimes
        if: steps.cache-flatpak-x64.outputs.cache-hit != 'true'
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.electronjs.Electron2.BaseApp//24.08 \
            org.freedesktop.Platform.ffmpeg-full//24.08

      - name: Build Linux x64 Flatpak
        run: npm run make -- --targets @electron-forge/maker-flatpak --arch x64

      - name: Upload Linux x64 Flatpak artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-linux-flatpak-x64
          path: out/make/**/*.flatpak
          if-no-files-found: error
          retention-days: 1

  # ── 3d. Build Linux arm64 Flatpak ────────────────────────────────────────────
  make-linux-flatpak-arm64:
    name: Make (Linux Flatpak arm64)
    needs: [test, test-e2e]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder elfutils

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        id: cache-flatpak-arm64
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-24.08-aarch64

      - name: Install Flatpak runtimes
        if: steps.cache-flatpak-arm64.outputs.cache-hit != 'true'
        run: |
          flatpak install --user -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.electronjs.Electron2.BaseApp//24.08 \
            org.freedesktop.Platform.ffmpeg-full//24.08

      - name: Build Linux arm64 Flatpak
        run: npm run make -- --targets @electron-forge/maker-flatpak --arch arm64

      - name: Upload Linux arm64 Flatpak artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-linux-flatpak-arm64
          path: out/make/**/*.flatpak
          if-no-files-found: error
          retention-days: 1

  # ── 3e. Build macOS arm64 installer ──────────────────────────────────────────
  make-macos-arm64:
    name: Make (macOS arm64)
    needs: [test, test-e2e]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS arm64 installer
        run: npm run make -- --arch arm64

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-macos-arm64
          path: out/make/**/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── 3f. Build macOS x64 installer ────────────────────────────────────────────
  make-macos-x64:
    name: Make (macOS x64)
    needs: [test, test-e2e]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS x64 installer
        run: npm run make -- --arch x64

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-macos-x64
          path: out/make/**/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── 3g. Build Windows x64 installer ──────────────────────────────────────────
  make-windows-x64:
    name: Make (Windows x64)
    needs: [test, test-e2e]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows x64 installer
        run: npm run make -- --arch x64
        env:
          BUILD_ARCH: x64

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-windows-x64
          path: out/make/**/*.exe
          if-no-files-found: error
          retention-days: 1

  # ── 3h. Build Windows arm64 installer ────────────────────────────────────────
  make-windows-arm64:
    name: Make (Windows arm64)
    needs: [test, test-e2e]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows arm64 installer
        run: npm run make -- --arch arm64
        env:
          BUILD_ARCH: arm64

      - name: Upload Windows arm64 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers-windows-arm64
          path: out/make/**/*.exe
          if-no-files-found: error
          retention-days: 1

  # ── 4. Create GitHub Release ─────────────────────────────────────────────────
  # Downloads all platform artifacts and attaches them to a release for the tag.
  release:
    name: Publish Release
    needs: [make-linux-x64, make-linux-arm64, make-linux-flatpak-x64, make-linux-flatpak-arm64, make-macos-arm64, make-macos-x64, make-windows-x64, make-windows-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-linux-x64
          path: dist/linux

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-linux-arm64
          path: dist/linux

      - name: Download Linux x64 Flatpak artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-linux-flatpak-x64
          path: dist/linux

      - name: Download Linux arm64 Flatpak artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-linux-flatpak-arm64
          path: dist/linux

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-macos-arm64
          path: dist/macos

      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-macos-x64
          path: dist/macos

      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-windows-x64
          path: dist/windows

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers-windows-arm64
          path: dist/windows

      - name: Rename artifacts to canonical filenames
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # macOS: Polyphon-*.dmg → Polyphon-{version}-{arch}.dmg
          find dist/macos -name "*.dmg" | while read -r f; do
            arch=$(echo "$f" | grep -oE 'arm64|x64')
            mv "$f" "$(dirname "$f")/Polyphon-${VERSION}-${arch}.dmg"
          done
          # Linux Flatpak: ai.polyphon.Polyphon_stable_{arch}.flatpak → Polyphon-{version}-{arch}.flatpak
          find dist/linux -name "*x86_64.flatpak" | while read -r f; do
            mv "$f" "$(dirname "$f")/Polyphon-${VERSION}-x64.flatpak"
          done
          find dist/linux -name "*aarch64.flatpak" | while read -r f; do
            mv "$f" "$(dirname "$f")/Polyphon-${VERSION}-arm64.flatpak"
          done
          # Linux deb: polyphon_{ver}_amd64.deb → Polyphon-{version}-x64.deb, etc.
          find dist/linux -name "*amd64.deb" | while read -r f; do
            mv "$f" "$(dirname "$f")/Polyphon-${VERSION}-x64.deb"
          done
          find dist/linux -name "*arm64.deb" | while read -r f; do
            mv "$f" "$(dirname "$f")/Polyphon-${VERSION}-arm64.deb"
          done
          # Windows: Polyphon-{version}-{arch}-Setup.exe is already correctly named by forge
          find dist/windows -name "*.exe" | while read -r f; do
            arch=$(basename "$f" | grep -oE 'arm64|x64')
            mv "$f" "$(dirname "$f")/Polyphon-${VERSION}-${arch}-Setup.exe"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          repository: polyphon-ai/releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body: |
            Download the installer for your platform below.

            See the [documentation](https://polyphon.ai/docs/getting-started/) for installation instructions.
          files: |
            dist/linux/**/*.deb
            dist/linux/**/*.flatpak
            dist/macos/**/*.dmg
            dist/windows/**/*.exe

  # ── 5. Update site: bump downloadVersion + publish release blog post ─────────
  # Checks out main, bumps hugo.yaml params, and creates a release announcement
  # post. The push to main triggers the deploy-site workflow automatically.
  update-site:
    name: Update Site
    needs: [release]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version variables
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SLUG="polyphon-${TAG//./-}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SLUG=$SLUG" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Bump hugo.yaml version params
        run: |
          sed -i "s/appVersion: \".*\"/appVersion: \"$VERSION\"/" site/hugo.yaml
          sed -i "s/downloadVersion: \".*\"/downloadVersion: \"$VERSION\"/" site/hugo.yaml

      - name: Create release blog post
        run: |
          mkdir -p "site/content/blog/$SLUG"
          cat > "site/content/blog/$SLUG/index.md" << EOF
          ---
          title: "Polyphon $VERSION"
          description: "Polyphon $VERSION is now available for download."
          date: "$DATE"
          draft: false
          tags: ["release"]
          categories: ["Announcements"]
          ---

          Polyphon **$VERSION** is now available. [Download it here](https://polyphon.ai/#download).
          EOF

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/hugo.yaml "site/content/blog/$SLUG/index.md"
          git commit -m "chore(site): update site for release $TAG"
          git push origin main
