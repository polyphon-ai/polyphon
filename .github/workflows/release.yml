name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  # ── 1. Lint + unit + integration + e2e ────────────────────────────────────
  test:
    name: Test
    runs-on: macos-latest
    timeout-minutes: 35
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Lint (TypeScript type-check)
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build app for e2e
        run: npm run build:e2e

      - name: E2E tests
        run: npx playwright test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-artifacts-${{ github.ref_name }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── 2. Build macOS arm64 DMG ──────────────────────────────────────────────
  make-macos-arm64:
    name: Make (macOS arm64)
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS arm64 DMG
        run: npm run make -- --arch arm64

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: installers-macos-arm64
          path: out/make/**/*.dmg
          if-no-files-found: error
          retention-days: 3

  # ── 3. Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [make-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: installers-macos-arm64
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          repository: polyphon-ai/releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
          body: |
            Download the macOS (Apple Silicon) installer below.

            See the [documentation](https://polyphon.ai/docs/getting-started/) for installation instructions.
          files: |
            dist/macos/**/*.dmg

  # ── 4. Update site download version ──────────────────────────────────────
  update-site:
    name: Update Site Version
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update downloadVersion in hugo.yaml
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/downloadVersion: .*/downloadVersion: \"${VERSION}\"/" site/hugo.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/hugo.yaml
          git commit -m "chore(release): update site downloadVersion to ${{ github.ref_name }}"
          git push
