name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**.md"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  # Runs once on Linux — type-checking is deterministic across OSes.
  # All subsequent jobs are gated on this passing.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript type-check
        run: npm run lint

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  test-unit:
    name: Unit tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript unit tests
        run: npm run test:unit

  # ── 3. Integration tests ───────────────────────────────────────────────────
  test-integration:
    name: Integration tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript integration tests
        run: npm run test:integration

  # ── 4. Build ───────────────────────────────────────────────────────────────
  # Verifies the Electron app packages on all three platforms.
  # E2E is gated on this — no point running Playwright if the app doesn't build.
  build:
    name: Build (${{ matrix.os }})
    needs: [test-unit, test-integration]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1

      - name: Build Electron app
        run: npm run package

  # ── 5. E2E tests (mocked) ──────────────────────────────────────────────────
  # Only runs after a clean build on all three platforms.
  # All voice providers are mocked — no real API calls are made.
  # POLYPHON_ANTHROPIC_API_KEY is optional; when set it exercises key-resolution
  # paths without hitting the API.
  test-e2e:
    name: E2E tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CI: true
      POLYPHON_ANTHROPIC_API_KEY: ${{ secrets.POLYPHON_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1 \
            xvfb

      # Windows runners sometimes lack system-level dependencies that Playwright
      # expects. --with-deps installs the OS packages that back the Chromium
      # renderer used by Playwright's Electron integration. First place to check
      # if the Windows e2e leg fails mysteriously.
      - name: Install Playwright dependencies (Windows)
        if: runner.os == 'Windows'
        run: npx playwright install --with-deps chromium

      - name: Build app for e2e
        run: npm run build:e2e

      - name: Run GUI e2e tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test

      - name: Run GUI e2e tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npx playwright test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ matrix.os }}-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
