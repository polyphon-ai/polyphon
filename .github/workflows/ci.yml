name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "site/**"
      - "docs/**"
      - "**.md"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  # Runs once on Linux — type-checking is deterministic across OSes.
  # All subsequent jobs are gated on this passing.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: TypeScript type-check
        run: npm run lint

  # ── 2. Unit tests ─────────────────────────────────────────────────────────
  test-unit:
    name: Unit tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: TypeScript unit tests
        run: npm run test:unit

  # ── 3. Integration tests ───────────────────────────────────────────────────
  test-integration:
    name: Integration tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: TypeScript integration tests
        run: npm run test:integration

  # ── 4. Build ───────────────────────────────────────────────────────────────
  # Verifies the Electron app packages on all three platforms.
  # E2E is gated on this — no point running Playwright if the app doesn't build.
  build:
    name: Build (${{ matrix.os }})
    needs: [test-unit, test-integration]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1

      - name: Build Electron app
        run: npm run package

  # ── 5. E2E tests (mocked) ──────────────────────────────────────────────────
  # Only runs after a clean build on all three platforms.
  # All voice providers are mocked — no real API calls are made.
  # POLYPHON_ANTHROPIC_API_KEY is optional; when set it exercises key-resolution
  # paths without hitting the API.
  test-e2e:
    name: E2E tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CI: true
      POLYPHON_ANTHROPIC_API_KEY: ${{ secrets.POLYPHON_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # ── Caching: all cache steps must come BEFORE setup-dev-drive (Windows)
      # so the post-step cache upload runs before the dev drive is dismounted.

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Windows runners sometimes lack system-level dependencies that Playwright
      # expects. --with-deps installs the OS packages that back the Chromium
      # renderer used by Playwright's Electron integration. First place to check
      # if the Windows e2e leg fails mysteriously.
      - name: Cache Playwright browsers (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Install before setup-dev-drive so node_modules land in the workspace on C:
      # and are (a) saved correctly by the cache post-step and (b) copied to the
      # dev drive by workspace-copy below.
      - name: Install npm dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # ── Windows: move workspace to a ReFS dev drive for faster I/O during
      # the Electron build and Playwright test run. workspace-copy: true copies
      # the checkout (including any restored/freshly-installed node_modules) to
      # the dev drive and sets DEV_DRIVE_WORKSPACE.
      - uses: samypr100/setup-dev-drive@v4
        if: runner.os == 'Windows'
        with:
          drive-size: 4GB
          workspace-copy: true
          native-dev-drive: true

      - name: Install Electron system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libgbm1 \
            libnss3 \
            libasound2t64 \
            libxshmfence1 \
            xvfb

      - name: Install Playwright dependencies (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.DEV_DRIVE_WORKSPACE }}
        run: npx playwright install --with-deps chromium

      - name: Build app for e2e (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.DEV_DRIVE_WORKSPACE }}
        run: npm run build:e2e

      - name: Build app for e2e (Linux / macOS)
        if: runner.os != 'Windows'
        run: npm run build:e2e

      - name: Run GUI e2e tests (Linux)
        if: runner.os == 'Linux'
        # Reduce virtual framebuffer from default 1280x1024x24 to 720p 16-bit to
        # lower Xvfb memory pressure during Electron rendering.
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x720x16' npx playwright test

      - name: Run GUI e2e tests (macOS)
        if: runner.os == 'macOS'
        run: npx playwright test

      - name: Run GUI e2e tests (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{ env.DEV_DRIVE_WORKSPACE }}
        run: npx playwright test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.os }}-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
